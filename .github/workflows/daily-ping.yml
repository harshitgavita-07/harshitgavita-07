name: 🔥 Daily Profile Refresh

on:
  schedule:
    - cron: '0 1 * * *'    # 6:30 AM IST daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Refresh timestamp
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          # Update hidden timestamp comment to trigger a commit = contribution
          sed -i "s/<!-- last-refresh:.*-->/<!-- last-refresh: $DATE -->/" README.md
          # If no marker exists, append it
          grep -q "last-refresh" README.md || echo "<!-- last-refresh: $DATE -->" >> README.md

      - name: Commit
        run: |
          git config user.name "profile-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: daily refresh $(date -u +%Y-%m-%d)"
          git push
